name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Pkl
        uses: pkl-community/setup-pkl@v0
        with:
          pkl-version: "0.31.0"

      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      - name: Install TypeScript and Zod
        run: bun add -d typescript zod

      - name: Verify package builds
        run: pkl project package . --output-path out/

      - name: Generate TypeScript (auto-discovers imports)
        run: |
          pkl run gen.pkl --project-dir . -- \
            tests/fixtures/ServiceConfig.pkl \
            tests/fixtures/AppConfig.pkl \
            --output-path test-output/ts

      - name: Generate Zod schemas (auto-discovers imports)
        run: |
          pkl run zod/gen.pkl --project-dir . -- \
            tests/fixtures/ServiceConfig.pkl \
            tests/fixtures/AppConfig.pkl \
            --output-path test-output/zod

      - name: Verify generated code compiles
        run: |
          bunx tsc --noEmit --strict --target es2020 --moduleResolution bundler --ignoreConfig \
            test-output/ts/*.ts test-output/ts/**/*.ts \
            test-output/zod/*.ts test-output/zod/**/*.ts

      - name: Show generated output
        run: find test-output -name '*.ts' | sort | while read f; do echo "=== $f ==="; cat "$f"; echo; done
